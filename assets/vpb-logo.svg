    <!-- lead tile: crisp, with a tiny "image" glyph = the browser's thumbnail -->
    <rect x="292" y="102" width="58" height="58" rx="12" fill="url(#accent)"/>
    <circle cx="309" cy="119" r="6" fill="#0c1017" opacity="0.85"/>
    <path d="M298 150 l14 -16 l10 11 l8 -9 l14 14 z" fill="#0c1017" opacity="0.85"/>
    <rect x="326" y="176" width="58" height="58" rx="12" fill="url(#accent)" opacity="0.95"/>
  </g>

  <!-- speed streaks trailing the wordmark -->
