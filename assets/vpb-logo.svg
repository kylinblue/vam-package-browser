<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2534"/>
      <stop offset="1" stop-color="#0c1017"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="streakL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="streakL2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0.75"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="8" y="8" width="496" height="496" rx="100" fill="url(#bg)"/>
  <rect x="10" y="10" width="492" height="492" rx="98" fill="none" stroke="#2e3d55" stroke-width="4"/>

  <!-- gallery thumbnails accelerating in from the left (motion-blur trail) -->
