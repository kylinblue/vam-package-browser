# Cuts a source-only release: no prebuilt binaries are distributed.
# Users build the app themselves via run-dev.bat (see README).
#
# Trigger: push a tag like `v0.1.0` (or run manually via workflow_dispatch,
# which runs the build check without creating a release).
#
# The job compiles the frontend (tsc + vite) and type-checks the Rust
# backend (cargo check) so a tag never points at source that doesn't
# build — then drafts a GitHub Release whose only artifacts are the
# auto-generated "Source code (zip / tar.gz)" archives.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend (tsc + vite)
        run: npm run build

      - name: Check Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Create GitHub Release (source only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            Source-only release — no prebuilt binaries. Download the source
            archive below (or clone the repo), then build and run with
            `run-dev.bat` as described in the README.
