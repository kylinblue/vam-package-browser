# Builds the Windows executable and publishes it to a GitHub Release.
#
# Trigger: push a tag like `v0.1.2` (or run manually via workflow_dispatch,
# which builds and uploads workflow artifacts without creating a release).
#
# One artifact per release:
#   - vam-package-browser-portable-windows-x64.zip — the bare exe + any
#     runtime DLLs cargo dropped next to it (WebView2 loader, onnxruntime).
#     No installer; unzip and run.
#
# Note: the release profile uses lto=true + codegen-units=1, so a cold
# build takes a while (~20-40 min). rust-cache keeps warm runs shorter.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app (exe only, no bundler)
        run: npm run tauri build -- --no-bundle

      - name: Stage portable zip
        shell: pwsh
        run: |
          $rel = "src-tauri/target/release"
          $stage = New-Item -ItemType Directory -Path "portable-stage"
          Copy-Item "$rel/vam-package-browser.exe" "$($stage.FullName)/VaM Package Browser.exe"
          # Runtime DLLs, if the build produced any (e.g. onnxruntime for
          # the embedding pipeline). Harmless when none exist.
          Get-ChildItem "$rel" -Filter "*.dll" -File -ErrorAction SilentlyContinue |
            Copy-Item -Destination $stage.FullName
          Compress-Archive -Path "$($stage.FullName)/*" `
            -DestinationPath "vam-package-browser-portable-windows-x64.zip"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: vam-package-browser-portable-windows-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: vam-package-browser-portable-windows-x64.zip
